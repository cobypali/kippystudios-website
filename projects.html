    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            display: flex;
            flex-direction: column;
        }

        main {
            padding: 100px 50px 48px;
            max-width: 1180px;
            margin: 0 auto;
            width: 100%;
        }

        .page-title {
            font-family: 'Inter', sans-serif;
            font-size: 36px;
            font-weight: 700;
            color: #E6EDF7;
            margin-bottom: 32px;
            max-width: 1080px;
            margin-left: auto;
            margin-right: auto;
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            max-width: 1080px;
            margin: 0 auto;
        }

        .project-card {
            background: #121A2B;
            border-radius: 16px;
            border: 1px solid #1A2438;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .project-media {
            width: 100%;
            aspect-ratio: 16 / 9;
            overflow: hidden;
            position: relative;
        }

        .project-media iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        .project-media img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            display: block;
        }

        .coming-soon-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: #7DD3FC;
            font-family: 'Inter', sans-serif;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 4px 8px;
            border-radius: 6px;
            border: 1px solid rgba(125, 211, 252, 0.3);
        }

        .project-info {
            padding: 16px 20px 20px;
        }

        .project-card h2 {
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            font-weight: 700;
            color: #E6EDF7;
            margin: 0;
        }

        @media (max-width: 900px) {
            .projects-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            main {
                padding: 80px 20px 40px;
            }

            .page-title {
                font-size: 26px;
                margin-bottom: 24px;
            }
        }

        @media (max-width: 520px) {
            .projects-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
